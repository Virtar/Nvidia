<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Futuro que ya comenzó — Sociedad & Tecnología</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=IBM+Plex+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #09090B;
    --bg2: #111114;
    --bg3: #18181C;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #F0EAD6;
    --text2: rgba(240,234,214,0.6);
    --text3: rgba(240,234,214,0.35);
    --coral: #E85C2E;
    --coral2: #FF8560;
    --teal: #1DB88A;
    --teal2: #5DDDB6;
    --amber: #D4900A;
    --amber2: #F0B429;
    --purple: #7B6EE8;
    --purple2: #A79EF5;
    --blue: #2E7BE8;
    --blue2: #6AA8FF;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
    --r: 10px;
    --r2: 16px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.025;
    pointer-events: none;
    z-index: 9999;
  }

  /* ── HEADER ── */
  header {
    max-width: 980px;
    margin: 0 auto;
    padding: 80px 32px 60px;
    border-bottom: 1px solid var(--border);
  }

  .kicker {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--coral);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .kicker::before { content: ''; display: block; width: 24px; height: 1px; background: var(--coral); }

  h1 {
    font-family: var(--font-display);
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 28px;
    color: var(--text);
  }

  h1 em {
    font-style: italic;
    color: var(--coral2);
  }

  .header-sub {
    font-size: 16px;
    color: var(--text2);
    max-width: 600px;
    line-height: 1.75;
    border-left: 2px solid var(--coral);
    padding-left: 20px;
    margin-bottom: 40px;
  }

  .header-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
  }

  .hstat {
    background: var(--bg2);
    padding: 20px 24px;
    transition: background 0.2s;
  }
  .hstat:hover { background: var(--bg3); }
  .hstat-num {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }
  .hstat-lbl { font-size: 11px; color: var(--text3); letter-spacing: 0.05em; line-height: 1.5; }
