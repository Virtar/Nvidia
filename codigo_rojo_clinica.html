<style>

  var audioCtx = null;

  function getAudioCtx(){
    if (!audioCtx){
      var Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return null;
      audioCtx = new Ctx();
    }
    if (audioCtx.state === 'suspended'){
      audioCtx.resume();
    }
    return audioCtx;
  }

  function playTone(freq, duration, type, gainPeak, when){
    if (state.muted) return;
    var ctx = getAudioCtx();
    if (!ctx) return;
    try{
      var t0 = ctx.currentTime + (when || 0);
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, t0);
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(gainPeak || 0.12, t0 + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t0);
      osc.stop(t0 + duration + 0.02);
    } catch(e){}
  }

    playTone(urgent ? 1100 : 880, 0.05, 'square', urgent ? 0.07 : 0.045);

  }
  function soundLose(){
    playTone(300, 0.18, 'sawtooth', 0.1, 0);
    playTone(240, 0.18, 'sawtooth', 0.1, 0.14);
    playTone(160, 0.3, 'sawtooth', 0.11, 0.28);
  }

  function seededRandom(seed){
    var s = seed % 2147483647;
    if (s <= 0) s += 2147483646;
    return function(){
      s = (s * 16807) % 2147483647;
      return (s - 1) / 2147483646;
    };
  }

  function shuffleArray(arr, rand){
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--){
      var j = Math.floor(rand() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function pickQuestionsBalanced(){
    var seed = Date.now() % 1000000 + 1;
    var rand = seededRandom(seed);

    var byTopic = {};
    ALL_QUESTIONS.forEach(function(q){
      if (!byTopic[q.topic]) byTopic[q.topic] = [];
      byTopic[q.topic].push(q);
    });
    var topics = shuffleArray(Object.keys(byTopic), rand);

    var picked = [];
    var pickedSet = new Set();

    topics.forEach(function(t){
      var pool = shuffleArray(byTopic[t], rand);
      if (pool.length > 0){
        picked.push(pool[0]);
        pickedSet.add(pool[0]);
      }
    });

    var remaining = ALL_QUESTIONS.filter(function(q){ return !pickedSet.has(q); });
    remaining = shuffleArray(remaining, rand);

    var idx = 0;
    while (picked.length < Math.min(GAME_LENGTH, ALL_QUESTIONS.length) && idx < remaining.length){
      picked.push(remaining[idx]);
      idx++;
    }

    return shuffleArray(picked.slice(0, GAME_LENGTH), rand);
  }

  var state = {
    questions: pickQuestionsBalanced(),
    idx: 0,
    lives: 3,
    score: 0,
    streak: 0,
    answered: false,
    finished: false,
    history: [],
    hintUsed: [],
    muted: false,
    timeLeft: TIME_PER_QUESTION,
    timerHandle: null
  };

  var root = document.getElementById('game-root');

  function shuffleOptionsForQuestion(q, seed){
    var idxs = [0,1,2,3];
    var rand = seededRandom(seed + 1);
    return shuffleArray(idxs, rand);
  }

  function vitalsClass(){
    if (state.lives >= 3) return 'green';
    if (state.lives === 2) return 'amber';
    return 'red';
  }

  function ecgPath(lives, justWrong){
    if (justWrong){
      return "M0,40 L40,40 L52,8 L64,68 L76,20 L88,40 L120,40 L132,40 L150,40 L162,10 L174,70 L186,30 L200,40 L240,40 L252,40 L264,8 L276,68 L288,20 L300,40 L340,40";
    }
    if (lives >= 3){
      return "M0,40 L40,40 L52,40 L60,18 L68,52 L76,40 L100,40 L150,40 L162,40 L170,18 L178,52 L186,40 L210,40 L260,40 L272,40 L280,18 L288,52 L296,40 L340,40";
    }
    if (lives === 2){
      return "M0,42 L40,42 L52,42 L58,26 L64,52 L70,42 L120,42 L150,42 L162,42 L168,26 L174,52 L180,42 L230,42 L260,42 L272,42 L278,26 L284,52 L290,42 L340,42";
    }
    return "M0,44 L40,44 L48,36 L56,48 L64,44 L160,44 L168,36 L176,48 L184,44 L260,44 L268,36 L276,48 L284,44 L340,44";
  }

  function escapeHtml(str){
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function stopTimer(){
    if (state.timerHandle){
      clearInterval(state.timerHandle);
      state.timerHandle = null;
    }
  }

  function startTimer(){
    stopTimer();
    var fill = document.getElementById('timer-fill');
    var num = document.getElementById('timer-num');
    state.timerHandle = setInterval(function(){
      state.timeLeft -= 1;
      if (num) num.textContent = state.timeLeft + 's';
      if (fill){
        var pct = Math.max(0, (state.timeLeft / TIME_PER_QUESTION) * 100);
        fill.style.width = pct + '%';
        fill.classList.remove('amber','red');
        if (state.timeLeft <= 5) fill.classList.add('red');
        else if (state.timeLeft <= 10) fill.classList.add('amber');
      }
      if (state.timeLeft <= 5 && state.timeLeft > 0){
        soundTick(true);
      } else if (state.timeLeft > 5){
        soundTick(false);
      }
      if (state.timeLeft <= 0){
        stopTimer();
        handleTimeout();
      }
    }, 1000);
  }

  function handleTimeout(){
    if (state.answered) return;
    state.answered = true;
    var q = state.questions[state.idx];
    state.history.push(false);
    state.lives -= 1;
    state.streak = 0;
    soundTimeout();

    var buttons = root.querySelectorAll('.opt-btn');
    buttons.forEach(function(b){
      b.disabled = true;
      var bi = parseInt(b.getAttribute('data-oi'), 10);
      if (bi === q.correct){ b.classList.add('correct'); }
      else { b.classList.add('faded'); }
    });

    var fb = document.getElementById('feedback');
    if (fb){
      fb.innerHTML = '<div class="feedback-box bad"><span>&#9203;</span><span>Se acabó el tiempo. ' + escapeHtml(q.explain) + '</span></div>';
    }
    var hintBtn = document.getElementById('hint-btn');
    if (hintBtn) hintBtn.disabled = true;

    if (state.lives <= 0){
      state.finished = true; state.outcome = 'down';
    } else if (state.idx === state.questions.length - 1){
      state.finished = true; state.outcome = 'completed';
    }

    var nextBtn = document.getElementById('next-btn');
    if (nextBtn){
      nextBtn.style.display = 'inline-block';
      nextBtn.textContent = state.finished ? 'Ver resultado final' : 'Siguiente alerta';
      nextBtn.addEventListener('click', function(){
        if (!state.finished){ state.idx += 1; state.answered = false; state.timeLeft = TIME_PER_QUESTION; }
        render();
      });
    }

    var ecgSvgPath = root.querySelector('svg.ecg path');
    if (ecgSvgPath){ ecgSvgPath.setAttribute('d', ecgPath(state.lives, true)); }
  }

  function render(){
    if (state.finished){ renderEnd(); return; }
    var q = state.questions[state.idx];
    var order = shuffleOptionsForQuestion(q, state.idx + 5);
    var vClass = vitalsClass();
    var hintActive = state.hintUsed[state.idx] === true;

    if (state.timeLeft === undefined || state.timeLeft === null){
      state.timeLeft = TIME_PER_QUESTION;
    }
    var timerPct = Math.max(0, (state.timeLeft / TIME_PER_QUESTION) * 100);
    var timerClass = state.timeLeft <= 5 ? 'red' : (state.timeLeft <= 10 ? 'amber' : '');

    var html = '';
    html += '<div class="topbar">';
    html += '<div class="topbar-left">Clínica San Andrés &middot; código rojo</div>';
    html += '<div class="topbar-right">';
    html += '<span class="qcounter">Pregunta ' + (state.idx+1) + ' de ' + state.questions.length + '</span>';
    html += '<button type="button" class="mute-btn" id="mute-btn" aria-label="' + (state.muted ? 'Activar sonido' : 'Silenciar sonido') + '">' + (state.muted ? '&#128263;' : '&#128266;') + '</button>';
    html += '</div></div>';

    html += '<div class="timer-row">';
    html += '<div class="timer-track"><div class="timer-fill ' + timerClass + '" id="timer-fill" style="width:' + timerPct + '%;"></div></div>';
    html += '<span class="timer-num" id="timer-num">' + state.timeLeft + 's</span>';
    html += '</div>';

    html += '<div class="vitals ' + vClass + '">';
    html += '<div class="vitals-head">';
    html += '<span class="vitals-label">Signos vitales del sistema</span>';
    html += '<div class="hearts">';
    for (var L=0; L<3; L++){
      html += '<span class="' + (L < state.lives ? '' : 'heart-off') + '">&#9829;</span>';
    }
    html += '</div></div>';
    html += '<svg class="ecg" viewBox="0 0 340 80"><path d="' + ecgPath(state.lives, state.history[state.history.length-1]===false) + '" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/></svg>';
    html += '</div>';

    html += '<div class="topic-pill">' + escapeHtml(q.topic) + '</div>';
    html += '<p class="stem">' + escapeHtml(q.stem) + '</p>';

    html += '<div class="options" id="options">';
    for (var k=0; k<4; k++){
      var oi = order[k];
      html += '<button type="button" class="opt-btn" data-oi="' + oi + '">' + escapeHtml(q.options[oi]) + '</button>';
    }
    html += '</div>';

    if (hintActive && !state.answered){
      html += '<div class="hint-box"><span>&#128161;</span><span>' + escapeHtml(q.hint) + '</span></div>';
    }

    html += '<div class="feedback" id="feedback"></div>';

    html += '<div class="bottom-row">';
    html += '<span class="score-line">Aciertos: ' + state.score + ' &middot; Racha: ' + state.streak + '</span>';
    html += '<div style="display:flex; gap:8px;">';
    html += '<button type="button" class="btn-ghost" id="hint-btn" ' + (hintActive || state.answered ? 'disabled' : '') + '>Pedir pista (&minus;1 punto)</button>';
    html += '<button type="button" class="btn-primary" id="next-btn" style="display:none;">Siguiente alerta</button>';
    html += '</div></div>';

    root.innerHTML = html;

    var muteBtn = document.getElementById('mute-btn');
    muteBtn.addEventListener('click', function(){
      state.muted = !state.muted;
      muteBtn.innerHTML = state.muted ? '&#128263;' : '&#128266;';
      muteBtn.setAttribute('aria-label', state.muted ? 'Activar sonido' : 'Silenciar sonido');
    });

    var hintBtn = document.getElementById('hint-btn');
    hintBtn.addEventListener('click', function(){
      state.hintUsed[state.idx] = true;
      state.score = Math.max(0, state.score - 1);
      render();
    });

    if (!state.answered){
      startTimer();
    }

    var buttons = root.querySelectorAll('.opt-btn');
    buttons.forEach(function(btn){
      btn.addEventListener('click', function(){
        if (state.answered) return;
        state.answered = true;
        stopTimer();
        var chosen = parseInt(btn.getAttribute('data-oi'), 10);
        var isCorrect = chosen === q.correct;
        state.history.push(isCorrect);

        buttons.forEach(function(b){
          var bi = parseInt(b.getAttribute('data-oi'), 10);
          b.disabled = true;
          if (bi === q.correct){ b.classList.add('correct'); }
          else if (bi === chosen){ b.classList.add('wrong'); }
          else { b.classList.add('faded'); }
        });

        var fb = document.getElementById('feedback');
        if (isCorrect){
          if (!state.hintUsed[state.idx]) state.score += 1;
          state.streak += 1;
          soundCorrect();
          fb.innerHTML = '<div class="feedback-box ok"><span>&#10003;</span><span>Sistema estabilizado. ' + escapeHtml(q.explain) + '</span></div>';
        } else {
          state.lives -= 1;
          state.streak = 0;
          soundWrong();
          fb.innerHTML = '<div class="feedback-box bad"><span>&#9888;</span><span>Alerta en el sistema. ' + escapeHtml(q.explain) + '</span></div>';
        }

        document.getElementById('hint-btn').disabled = true;

        if (state.lives <= 0){
          state.finished = true; state.outcome = 'down';
        } else if (state.idx === state.questions.length - 1){
          state.finished = true; state.outcome = 'completed';
        }

        var nextBtn = document.getElementById('next-btn');
        nextBtn.style.display = 'inline-block';
        nextBtn.textContent = state.finished ? 'Ver resultado final' : 'Siguiente alerta';
        nextBtn.addEventListener('click', function(){
          if (!state.finished){ state.idx += 1; state.answered = false; state.timeLeft = TIME_PER_QUESTION; }
          render();
        });

        var ecgSvgPath = root.querySelector('svg.ecg path');
        if (!isCorrect && ecgSvgPath){ ecgSvgPath.setAttribute('d', ecgPath(state.lives, true)); }
      });
    });
  }

  function renderEnd(){
    stopTimer();
    var total = state.questions.length;
    var pct = Math.round((state.score / total) * 100);
    var vClass = state.outcome === 'down' ? 'red' : (pct >= 75 ? 'green' : 'amber');
    var title = state.outcome === 'down'
      ? 'El sistema de la clínica colapsó'
      : (pct >= 90 ? 'Sistema completamente estabilizado' : (pct >= 75 ? 'Sistema estabilizado' : 'Sistema recuperado, con secuelas'));

    if (!state.endSoundPlayed){
      state.endSoundPlayed = true;
      if (state.outcome === 'down'){ soundLose(); } else { soundWin(); }
    }

    var html = '';
    html += '<div class="end-box ' + vClass + '">';
    html += '<div style="font-size:28px;">' + (state.outcome === 'down' ? '&#9888;' : '&#128737;') + '</div>';
    html += '<p class="end-title">' + title + '</p>';
    html += '<p class="end-sub">Resolviste ' + state.score + ' de ' + total + ' incidentes (' + pct + '%)</p>';
    html += '</div>';

    var byTopic = {};
    state.questions.forEach(function(q, i){
      if (!byTopic[q.topic]) byTopic[q.topic] = { ok:0, total:0 };
      byTopic[q.topic].total += 1;
      if (state.history[i]) byTopic[q.topic].ok += 1;
    });

    html += '<p class="topic-review-title">Repaso por tema (esta partida)</p>';
    Object.keys(byTopic).forEach(function(t){
      var d = byTopic[t];
      var weak = d.ok < d.total;
      html += '<div class="topic-row"><span>' + escapeHtml(t) + '</span><span class="' + (weak ? 'topic-bad' : 'topic-ok') + '">' + d.ok + '/' + d.total + '</span></div>';
    });

    html += '<p class="footnote">Banco total: ' + ALL_QUESTIONS.length + ' preguntas, repartidas en 9 temas. Cada partida sortea ' + GAME_LENGTH + ' garantizando al menos una de cada tema. Tenés ' + TIME_PER_QUESTION + ' segundos por pregunta. Jugá de nuevo para repasar otras combinaciones.</p>';

    html += '<button type="button" class="btn-primary full-btn" id="restart-btn">Jugar otra ronda</button>';

    root.innerHTML = html;
    document.getElementById('restart-btn').addEventListener('click', function(){
      var wasMuted = state.muted;
      state = { questions: pickQuestionsBalanced(), idx:0, lives:3, score:0, streak:0, answered:false, finished:false, history:[], hintUsed:[], muted: wasMuted, timeLeft: TIME_PER_QUESTION, timerHandle: null };
      render();
    });
  }

  render();
})();
</script>
</body>
</html>
